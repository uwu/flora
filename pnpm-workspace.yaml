packages:
  - 'examples/*'
  - 'apps/*'
  - 'packages/*'
  - 'packages/florine/example'

catalog:
  '@babel/core': 7.29.0
  '@hey-api/openapi-ts': 0.96.0
  '@hey-api/vite-plugin': 0.3.0
  '@oxc-solid-js/vite': 0.1.0-alpha.15
  '@rolldown/plugin-babel': 0.2.1
  '@shikijs/core': 4.0.2
  '@shikijs/engine-javascript': 4.0.2
  '@shikijs/langs': 4.0.2
  '@tanstack/react-query': ^5.90.21
  '@types/babel__core': 7.20.5
  '@types/node': ^24
  '@typescript/native-preview': ^7.0.0-dev.20260105.1
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@0.1.16
  vite-plus: 0.1.16
  vitest: npm:@voidzero-dev/vite-plus-test@0.1.16

catalogMode: prefer
ignoreDepScripts: true
ignoreWorkspaceRootCheck: true
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
savePrefix: ''
shellEmulator: true
