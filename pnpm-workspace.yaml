packages:
  - 'examples/*'
  - 'apps/*'
  - 'packages/*'

catalog:
  '@babel/core': 7.29.0
  '@rolldown/plugin-babel': 0.2.1
  '@types/babel__core': 7.20.5
  '@types/node': ^24
  '@typescript/native-preview': ^7.0.0-dev.20260105.1
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
ignoreDepScripts: true
ignoreWorkspaceRootCheck: true
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
savePrefix: ''
shellEmulator: true
