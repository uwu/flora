name: Publish Runtime

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Container tag to publish to ghcr.io'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish-runtime:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image name
        id: image
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          echo "name=ghcr.io/${REPOSITORY_OWNER,,}/flora" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Materialize submodule git dirs for Docker
        run: |
          mapfile -t submodule_entries < <(
            git submodule foreach --recursive --quiet \
              'printf "%s\t%s\n" "$displaypath" "$(git rev-parse --absolute-git-dir)"'
          )

          for submodule_entry in "${submodule_entries[@]}"; do
            submodule_path="${submodule_entry%%$'\t'*}"
            submodule_gitdir="${submodule_entry#*$'\t'}"
            git_metadata_path="$submodule_path/.git"

            if [ -f "$git_metadata_path" ]; then
              rm "$git_metadata_path"
              mkdir "$git_metadata_path"
              cp -a "$submodule_gitdir"/. "$git_metadata_path/"
            fi

            if [ -f "$git_metadata_path/config" ]; then
              git config --file "$git_metadata_path/config" --unset core.worktree || true
            fi
          done

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/runtime/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ inputs.image_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=publish-runtime
          cache-to: type=gha,scope=publish-runtime,mode=max

      - name: Print published image
        run: echo "Published ${{ steps.image.outputs.name }}:${{ inputs.image_tag }}"
