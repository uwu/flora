name: npm-publish-cli-canary

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Compute canary version
        id: version
        run: |
          CANARY_VERSION="0.0.0-canary.${GITHUB_RUN_NUMBER}.${GITHUB_SHA::7}"
          echo "canary_version=$CANARY_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set canary version
        run: pnpm --filter @uwu/flora-cli exec npm version "${{ steps.version.outputs.canary_version }}" --no-git-tag-version

      - name: Build CLI
        run: pnpm --filter @uwu/flora-cli run build

      - name: Publish npm package
        run: pnpm --filter @uwu/flora-cli exec npm publish --provenance --access public --tag canary
