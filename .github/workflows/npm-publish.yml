name: npm-publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: package to publish
        type: choice
        options:
          - sdk
          - cli
          - api-client
          - all
        default: sdk
      tag:
        description: npm dist-tag
        type: choice
        options:
          - latest
          - canary
          - next
        default: latest
      version:
        description: npm version (optional)
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build + publish
        env:
          PACKAGE: ${{ inputs.package }}
          TAG: ${{ inputs.tag }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          publish_one() {
            local pkg="$1"
            local build_cmd="$2"

            if [ -n "${VERSION}" ]; then
              pnpm --filter "$pkg" exec npm version "$VERSION" --no-git-tag-version
            fi

            if [ -n "$build_cmd" ]; then
              pnpm --filter "$pkg" run "$build_cmd"
            fi

            pnpm --filter "$pkg" exec npm publish --access public --tag "$TAG"
          }

          case "$PACKAGE" in
            sdk)
              publish_one "@uwu/flora-sdk" "build"
              ;;
            cli)
              publish_one "@uwu/flora-cli" "build"
              ;;
            api-client)
              publish_one "@uwu/flora-api-client" "build"
              ;;
            all)
              publish_one "@uwu/flora-sdk" "build"
              publish_one "@uwu/flora-api-client" "build"
              publish_one "@uwu/flora-cli" "build"
              ;;
            *)
              echo "unknown package: $PACKAGE" >&2
              exit 1
              ;;
          esac
