services:
  postgres-dev:
    image: postgres:15
    environment:
      POSTGRES_DB: flora
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  valkey-dev:
    image: valkey/valkey:latest
    ports:
      - '127.0.0.1:5434:6379'
    volumes:
      - valkey_dev_data:/data

volumes:
  postgres_dev_data:
  valkey_dev_data:
