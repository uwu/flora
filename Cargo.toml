[package]
name = "flora"
version = "0.1.0"
edition = "2024"

[workspace]
resolver = "2"
members = [".", "cli"]

[workspace.dependencies]
clap = "4.5.20"
color-eyre = "0.6.5"
openssl = { version = "0.10.75", features = ["vendored"] }
reqwest = { version = "0.12.25", features = ["json"] }
serde = "1"
serde_json = "1"
tokio = "1"

[dependencies]
axum = "0.8.7"
base64 = { version = "0.22", default-features = false, features = ["alloc"] }
chrono = { version = "0.4", features = ["serde"] }
color-eyre = "0.6.5"
cookie = "0.18"
deno_core = { version = "0.376.0", default-features = false, features = [
  "v8_use_custom_libcxx"
] }
deno_error = "0.7.1"
deno_fetch = "0.249.0"
deno_net = "0.217.0"
deno_permissions = "0.84.0"
deno_telemetry = "0.47.0"
deno_tls = "0.212.0"
deno_web = "0.256.0"
deno_webidl = "0.225.0"
dotenvy = "0.15"
eyre = "0.6.12"
fred = "10.1.0"
hex = "0.4"
hmac = "0.12"
openssl = { version = "0.10.75", features = ["vendored"] }
oxc = { version = "0.101.0", features = [
  "full",
  "oxc_regular_expression",
  "semantic",
  "transformer"
] }
oxc_sourcemap = "6"
rand = "0.8"
reqwest = { version = "0.12.25", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serenity = "0.12.4"
sha2 = "0.10"
sqlx = { version = "0.8.6", features = [
  "chrono",
  "macros",
  "postgres",
  "runtime-tokio-rustls",
  "uuid"
] }
sys_traits = { version = "0.1.17", features = ["real", "libc"] }
thiserror = "2.0.17"
time = "0.3"
tokio = { version = "1", features = ["full"] }
tracing = "0.1.43"
tracing-subscriber = { version = "0.3.22", features = [
  "chrono",
  "env-filter",
  "serde",
  "time"
] }
urlencoding = "2.1"
url = "2"
utoipa = { version = "5.4.0", features = [
  "auto_into_responses",
  "axum_extras",
  "chrono",
  "config",
  "debug",
  "url",
  "uuid"
] }
utoipa-scalar = { version = "0.3.0", features = ["axum"] }
